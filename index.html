<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NBA Operations — Transaction Checklists</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #f7f8fa;
    --white:     #ffffff;
    --border:    #e4e7ec;
    --border2:   #d0d5dd;
    --accent:    #1a56db;
    --accent-bg: #eff4ff;
    --text:      #101828;
    --text2:     #475467;
    --text3:     #98a2b3;
    --green:     #027a48;
    --green-bg:  #ecfdf3;
    --green-dot: #12b76a;
    --yellow:    #b54708;
    --yellow-bg: #fffaeb;
    --red:       #b42318;
    --red-bg:    #fef3f2;
    --blue-note: #1d4ed8;
    --blue-note-bg: #eff6ff;
    --radius:    8px;
    --sidebar:   240px;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { font-size: 14px; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    font-weight: 400;
    line-height: 1.5;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── HEADER ── */
  header {
    background: var(--white);
    border-bottom: 1px solid var(--border);
    height: 56px;
    display: flex;
    align-items: center;
    padding: 0 24px;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .logo {
    font-size: 14px;
    font-weight: 600;
    color: var(--text);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-badge {
    background: var(--accent);
    color: #fff;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    padding: 2px 7px;
    border-radius: 4px;
  }
  .header-right {
    font-size: 12px;
    color: var(--text3);
  }

  /* ── LAYOUT ── */
  .app { display: flex; min-height: calc(100vh - 56px); }

  /* ── SIDEBAR ── */
  .sidebar {
    width: var(--sidebar);
    flex-shrink: 0;
    background: var(--white);
    border-right: 1px solid var(--border);
    padding: 12px 0 24px;
    position: sticky;
    top: 56px;
    height: calc(100vh - 56px);
    overflow-y: auto;
  }
  .sidebar-group { padding: 16px 12px 4px; }
  .sidebar-group:first-child { padding-top: 8px; }
  .sidebar-label {
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text3);
    padding: 0 4px 6px;
    display: block;
  }
  .sidebar-hr { border: none; border-top: 1px solid var(--border); margin: 4px 12px; }
  .nav-btn {
    width: 100%;
    background: none;
    border: none;
    border-radius: 6px;
    text-align: left;
    padding: 8px 10px;
    cursor: pointer;
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text2);
    transition: all 0.1s;
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 1px;
  }
  .nav-btn:hover { color: var(--text); background: var(--bg); }
  .nav-btn.active { color: var(--accent); background: var(--accent-bg); font-weight: 500; }
  .nav-icon { font-size: 14px; flex-shrink: 0; }
  .nav-pct {
    margin-left: auto;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--text3);
  }
  .nav-btn.active .nav-pct { color: var(--accent); }

  /* ── MAIN ── */
  .main { flex: 1; padding: 28px 32px; max-width: 820px; }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    margin-bottom: 24px;
    padding-bottom: 20px;
    border-bottom: 1px solid var(--border);
  }
  .page-title {
    font-size: 22px;
    font-weight: 600;
    color: var(--text);
    line-height: 1.2;
    letter-spacing: -0.01em;
  }
  .page-desc {
    font-size: 13px;
    color: var(--text2);
    margin-top: 5px;
    line-height: 1.6;
    max-width: 480px;
  }

  /* ── PROGRESS ── */
  .progress-wrap { display: flex; flex-direction: column; align-items: center; gap: 5px; flex-shrink: 0; }
  .ring-container { position: relative; width: 58px; height: 58px; }
  .ring-container svg { transform: rotate(-90deg); }
  .ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
  .ring-fg { fill: none; stroke: var(--accent); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
  .ring-pct {
    position: absolute; inset: 0; display: flex; align-items: center; justify-content: center;
    font-family: 'JetBrains Mono', monospace; font-size: 13px; font-weight: 500; color: var(--accent);
  }
  .ring-label { font-size: 11px; color: var(--text3); text-align: center; }
  .reset-btn {
    background: none; border: 1px solid var(--border2); color: var(--text3);
    font-family: 'Inter', sans-serif; font-size: 12px; padding: 4px 10px;
    border-radius: 6px; cursor: pointer; transition: all 0.1s;
  }
  .reset-btn:hover { border-color: var(--text3); color: var(--text2); }

  /* ── COMPLIANCE BANNER ── */
  .compliance-banner {
    background: var(--blue-note-bg);
    border: 1px solid #bfdbfe;
    border-radius: var(--radius);
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 12.5px;
    line-height: 1.7;
    color: #1e40af;
  }
  .compliance-banner strong {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--blue-note);
    margin-bottom: 8px;
  }
  .compliance-banner ul { padding-left: 16px; display: flex; flex-direction: column; gap: 3px; }

  /* ── FILTERS ── */
  .filter-row { display: flex; align-items: center; gap: 5px; margin-bottom: 18px; flex-wrap: wrap; }
  .filter-lbl { font-size: 12px; color: var(--text3); font-weight: 500; margin-right: 3px; }
  .filter-btn {
    background: var(--white); border: 1px solid var(--border); color: var(--text2);
    font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 400;
    padding: 4px 10px; border-radius: 6px; cursor: pointer; transition: all 0.1s;
  }
  .filter-btn:hover { border-color: var(--border2); color: var(--text); }
  .filter-btn.active { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 500; }

  /* ── SECTIONS ── */
  .section {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 10px;
    overflow: hidden;
  }
  .section-header {
    display: flex; align-items: center; gap: 10px;
    padding: 11px 16px; cursor: pointer; user-select: none;
    transition: background 0.1s;
  }
  .section-header:hover { background: var(--bg); }
  .section-num { font-family: 'JetBrains Mono', monospace; font-size: 10px; color: var(--text3); flex-shrink: 0; }
  .section-name { font-size: 12px; font-weight: 600; color: var(--text); flex: 1; text-transform: uppercase; letter-spacing: 0.05em; }
  .section-pill {
    font-family: 'JetBrains Mono', monospace; font-size: 11px; color: var(--text3);
    background: var(--bg); border: 1px solid var(--border); padding: 1px 7px; border-radius: 10px;
  }
  .section-chevron { color: var(--text3); font-size: 10px; transition: transform 0.15s; }
  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }
  .section-body { border-top: 1px solid var(--border); }

  /* ── TASKS ── */
  .task {
    display: flex; align-items: flex-start; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background 0.08s;
  }
  .task:last-child { border-bottom: none; }
  .task:hover { background: var(--bg); }
  .task.done { opacity: 0.4; }
  .task-check {
    width: 16px; height: 16px; border-radius: 4px; border: 1.5px solid var(--border2);
    flex-shrink: 0; margin-top: 2px; display: flex; align-items: center; justify-content: center;
    font-size: 10px; transition: all 0.12s; background: var(--white);
  }
  .task.done .task-check { background: var(--green-dot); border-color: var(--green-dot); color: #fff; font-weight: 700; }
  .task-body { flex: 1; min-width: 0; }
  .task-title { font-size: 13.5px; font-weight: 500; color: var(--text); line-height: 1.45; }
  .task.done .task-title { text-decoration: line-through; color: var(--text3); }
  .task-note { font-size: 12.5px; color: var(--text2); margin-top: 3px; line-height: 1.6; }
  .task-compliance {
    margin-top: 6px; font-size: 12px; color: var(--blue-note);
    background: var(--blue-note-bg); border-left: 2px solid #93c5fd;
    padding: 5px 10px; border-radius: 0 5px 5px 0; line-height: 1.6;
  }
  .task-meta { display: flex; align-items: center; gap: 4px; margin-top: 7px; flex-wrap: wrap; }

  /* ── TAGS ── */
  .tag {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
    padding: 2px 6px; border-radius: 4px; letter-spacing: 0.02em;
  }
  .tag.legal      { background: #eff6ff; color: #1d4ed8; }
  .tag.finance    { background: #f0fdf4; color: #15803d; }
  .tag.pr         { background: #fdf4ff; color: #7e22ce; }
  .tag.hr         { background: #fff7ed; color: #c2410c; }
  .tag.ops        { background: #f8fafc; color: #475467; border: 1px solid var(--border); }
  .tag.medical    { background: #f0fdfa; color: #0f766e; }
  .tag.league     { background: #fefce8; color: #854d0e; }
  .tag.scouting   { background: #fdf2f8; color: #9d174d; }
  .tag.compliance { background: #eff6ff; color: #1d4ed8; }
  .tag.it         { background: #f0fdf4; color: #166534; }

  .deadline {
    font-family: 'JetBrains Mono', monospace; font-size: 10px; font-weight: 500;
    padding: 2px 6px; border-radius: 4px;
  }
  .deadline.urgent { background: var(--red-bg);    color: var(--red); }
  .deadline.soon   { background: var(--yellow-bg); color: var(--yellow); }
  .deadline.normal { background: var(--bg);        color: var(--text3); border: 1px solid var(--border); }

  /* ── ALL DONE ── */
  .all-done {
    background: var(--green-bg); border: 1px solid #a7f3d0; border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 20px; font-size: 13px; font-weight: 500;
    color: var(--green); display: flex; align-items: center; gap: 8px;
  }

  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <div class="logo">
    <span class="logo-badge">DEN</span>
    Basketball Operations — Transaction SOP
  </div>
  <div class="header-right" style="display:flex;align-items:center;gap:16px;">
    <span id="sync-status" style="font-size:12px;color:var(--text3);">● Connecting…</span>
    <span>Denver Nuggets</span>
  </div>
</header>

<div class="app">
  <nav class="sidebar">
    <div class="sidebar-group">
      <span class="sidebar-label">Signing</span>
      <button class="nav-btn active" onclick="switchTab('signing_mid')" id="nav-signing_mid">
        <span class="nav-icon">📅</span> Midseason <span class="nav-pct" id="prog-signing_mid">0%</span>
      </button>
      <button class="nav-btn" onclick="switchTab('signing_off')" id="nav-signing_off">
        <span class="nav-icon">☀️</span> Offseason <span class="nav-pct" id="prog-signing_off">0%</span>
      </button>
      <button class="nav-btn" onclick="switchTab('draft')" id="nav-draft">
        <span class="nav-icon">🎓</span> Draft Pick <span class="nav-pct" id="prog-draft">0%</span>
      </button>
    </div>
    <hr class="sidebar-hr">
    <div class="sidebar-group">
      <span class="sidebar-label">Transactions</span>
      <button class="nav-btn" onclick="switchTab('trade')" id="nav-trade">
        <span class="nav-icon">🔄</span> Trade <span class="nav-pct" id="prog-trade">0%</span>
      </button>
      <button class="nav-btn" onclick="switchTab('waiver')" id="nav-waiver">
        <span class="nav-icon">📋</span> Waiver / Release <span class="nav-pct" id="prog-waiver">0%</span>
      </button>
    </div>
  </nav>

  <main class="main" id="main-content"></main>
</div>

<script type="module">
const CHECKLISTS = {
  signing_mid: {
    title:"Midseason Signing",
    desc:"SOP for signing a player during the regular season (10-day or rest-of-season contract). Follow steps in order.",
    compliance:{

        "🏨 10-day contract: reasonable lodging in Denver for the duration of the contract (10 days).",
        "🏨 Rest-of-season contract: reasonable lodging in Denver up to 30 days only.",
        "🚫 Cannot pay pre-signing expenses for players not yet under contract — except recruiting trips (§III.I.1): max 3 trips, 3 days/trip, player's home city or Denver only, no charter aircraft, $500 hospitality gift cap total.",

        {title:"Verbal agreement (in principle) with agent on deal terms",note:"Document agreed terms internally with date/time stamp. Confirm contract type: 10-day, hardship, or rest-of-season.",tags:["legal","ops"],deadline:"urgent",deadlineText:"Before any paperwork"},
        {title:"Send health disclosure form to player — await doctors' clearance",note:"Player must sign health disclosure so team doctors can confirm health status. Do not proceed to full contract until cleared.",tags:["medical","legal"],deadline:"urgent",deadlineText:"Once deal is close",compliance:"⚠️ Cannot pay player's travel to come in for the physical until he is under contract. (§III.I.4, §I.A.6)"},

        {title:"Confirm salary cap space and applicable exception",note:"Verify which exception applies: 10-day hardship, MLE, minimum salary, etc. Run updated cap sheet.",tags:["finance","legal"],deadline:"urgent",deadlineText:"Before offer"}
      ]},
      {name:"Contract Drafting & Review",tasks:[
        {title:"Draft contract — PCI form and UPC exhibits",note:"Use NBA-standard Uniform Player Contract. Attach all required exhibits. Confirm contract type and term.",tags:["legal"],deadline:"urgent",deadlineText:"Same day as agreement"},
        {title:"Send draft to league office and internal reviewers",note:"Email: Ross, Blaise (BlRoss@nba.com); Wasserman, Tyler (TWasserman@nba.com); Doria, Matthew (mdoria@nba.com); Gerstenblatt, Hannah (HGerstenblatt@nba.com); West, Katelyn Cannella (KWest@nba.com); Crotts, Cameron (ccrotts@nba.com); Taub, Andy (ataub@nba.com); Ben Tenzer (Ben.Tenzer@Nuggets.com); Jon Wallace (Jon.Wallace@Nuggets.com).",tags:["legal","league"],deadline:"urgent",deadlineText:"Immediately after drafting"},
        {title:"Incorporate changes from league office review",note:"Address all feedback. Re-circulate if changes are material.",tags:["legal"],deadline:"urgent",deadlineText:"Upon receipt of feedback"},
        {title:"Send revised draft to agent for review and sign-off",note:"Allow reasonable time for agent review. Confirm agent is NBPA-certified.",tags:["legal"],deadline:"urgent",deadlineText:"After league review complete"},
        {title:"Agent signs off on contract",note:"Get written confirmation from agent that terms are agreed.",tags:["legal"],deadline:"urgent",deadlineText:"Before DocuSign upload"}
      ]},
      {name:"Execution",tasks:[
        {title:"Upload contract to DocuSign — player and GM to sign",note:"Confirm all pages are initialed. Both player and GM (authorized signatory) must execute.",tags:["legal","ops"],deadline:"urgent",deadlineText:"After agent sign-off"},
        {title:"Send fully executed contract to league and internal ops",note:"Email to: playercontracts@nba.com; Ben Tenzer (Ben.Tenzer@Nuggets.com); Jon Wallace (Jon.Wallace@Nuggets.com). Then forward that same email to the agent.",tags:["league","ops"],deadline:"urgent",deadlineText:"Immediately after execution"},
        {title:"Email Nuggets basketball ops",note:"Notify internal basketball ops that contract is executed and player is official.",tags:["ops"],deadline:"urgent",deadlineText:"Same day as submission"},
        {title:"Email PR team — contract is officially signed",note:"Notify PR once contract is fully executed and league approval is confirmed so they can coordinate any announcements.",tags:["pr"],deadline:"urgent",deadlineText:"Upon league confirmation"}
      ]},
      {name:"Certification (Parallel Process)",tasks:[
        {title:"Agent sends you the signed certification form",note:"Follow up with agent if not received promptly after execution.",tags:["legal","league"],deadline:"soon",deadlineText:"After contract execution"},
        {title:"Forward signed certification form to Erika Ruiz at league office",note:"Send to Erika Ruiz at the NBA league office.",tags:["league"],deadline:"soon",deadlineText:"Upon receipt from agent"}
      ]},
      {name:"Player Onboarding",tasks:[
        {title:"Arrange transportation from player's home city to Denver",note:"Team may pay reasonable transportation to/from player's home city.",tags:["ops","finance"],deadline:"urgent",deadlineText:"Before player arrives",compliance:"✅ Permitted: reasonable transportation to/from home city for 10-day and rest-of-season contracts. (§III.I.4(c))"},
        {title:"Arrange lodging in Denver",note:"10-day: team may pay lodging for the duration of the contract. Rest-of-season: up to 30 days.",tags:["ops","finance"],deadline:"urgent",deadlineText:"Before player arrives",compliance:"✅ 10-day: lodging for contract duration only. Rest-of-season: up to 30 days. (§III.I.4(a)(b))"},
        {title:"Chad & Shemar (Player Services) coordinate HR onboarding",note:"Player Services to connect with player and ensure all HR onboarding paperwork is completed.",tags:["hr","ops"],deadline:"soon",deadlineText:"Day 1"},
        {title:"Issue credentials and facility access",note:"Practice facility, arena, parking. Locker room assignment.",tags:["ops"],deadline:"soon",deadlineText:"Before first practice"},
        {title:"Equipment and jersey provisioned",note:"Confirm jersey number. Full kit: home, away, practice.",tags:["ops"],deadline:"soon",deadlineText:"Before first practice"},
        {title:"Add to travel manifest",note:"Coordinate with travel coordinator. Confirm passport/visa status if international travel upcoming.",tags:["ops"],deadline:"soon",deadlineText:"Before next road trip"},
        {title:"Payroll and direct deposit setup",note:"Player completes W-9 or W-8BEN. Finance sets up direct deposit per contract payment schedule.",tags:["finance","hr"],deadline:"soon",deadlineText:"Within 3 business days"}
      ]}
    ]
  },

  signing_off: {

      {name:"Contract Drafting & Review",tasks:[

        {title:"Incorporate changes from league office review",note:"Address all feedback before sending to agent.",tags:["legal"],deadline:"urgent",deadlineText:"Upon receipt of feedback"},
        {title:"Send revised draft to agent for review and sign-off",note:"Allow reasonable time for agent review. Confirm agent is NBPA-certified.",tags:["legal"],deadline:"urgent",deadlineText:"After league review complete"},
        {title:"Agent signs off on contract",note:"Get written confirmation from agent that all terms are agreed.",tags:["legal"],deadline:"urgent",deadlineText:"Before DocuSign upload"}
      ]},
      {name:"Execution",tasks:[
        {title:"Upload contract to DocuSign — player and GM to sign",note:"All pages initialed. Both player and GM must execute. Cannot be signed before signing period opens.",tags:["legal","ops"],deadline:"urgent",deadlineText:"After agent sign-off"},
        {title:"Send fully executed contract to league and internal ops",note:"Email to: playercontracts@nba.com; Ben Tenzer (Ben.Tenzer@Nuggets.com); Jon Wallace (Jon.Wallace@Nuggets.com). Then forward that same email to the agent.",tags:["league","ops"],deadline:"urgent",deadlineText:"Immediately after execution"},

      {name:"Player Onboarding",tasks:[
        {title:"Arrange travel from player's offseason residence to Denver",note:"May pay reasonable travel from offseason home to Denver prior to training camp.",tags:["ops","finance"],deadline:"soon",deadlineText:"Before training camp",compliance:"✅ Permitted: reasonable travel from offseason residence to Denver pre-training camp. (§I.A.6(a))"},
        {title:"Assess eligibility for offseason workout expense reimbursement",note:"Only eligible: rookies (any salary), min-salary players with ≤3 YOS not living in Denver, or Two-Way players. All others cover their own offseason expenses.",tags:["finance","compliance"],deadline:"soon",deadlineText:"Before any payments",compliance:"⚠️ Only rookies, Two-Way players, and min-salary players with ≤3 YOS qualify. Max 30 days. (§I.A.6(b))"},
        {title:"Third-party conditioning program expenses (if applicable)",note:"Only for eligible players in programs like P3, Impact Basketball, or Pure Sweat Basketball.",tags:["finance","compliance"],deadline:"normal",deadlineText:"If applicable",compliance:"✅ Up to 2 weeks. Cap: $10K/week (group), $15K/week (individual) + travel/lodging/meals. Chef, massage therapist, nutritionist NOT covered. (§I.A.6(c))"},
        {title:"Chad & Shemar (Player Services) coordinate HR onboarding",note:"Player Services connects with player to complete all HR onboarding paperwork.",tags:["hr","ops"],deadline:"soon",deadlineText:"Before training camp"},

  trade: {
    title:"Trade",
    desc:"SOP for completing an NBA trade. Most steps occur within the same league email thread. No player may play, practice, or do any physical activity with his new team until the league sends final confirmation.",
    compliance:{
      title:"Compliance — Trade Expenses · UPC ¶10(b), Ops Manual §III.I.2(b)",
      points:[
        "📦 INCOMING PLAYER — Moving expenses (UPC ¶10(b)): Denver, as the assignee team, is obligated to pay all reasonable expenses incurred by the incoming player in moving himself and his family to Denver. This is a contractual obligation under the standard UPC, not discretionary.",
        "✈️ INCOMING PLAYER — Travel to report (Ops Manual §III.I.2(b)): Denver may pay transportation required for the player to report and attend a physical.",
        "📦 INCOMING PLAYER — Moving expenses (UPC ¶10(b)): Once the trade is complete, Denver is contractually obligated to pay all reasonable expenses for the player to move himself and his family to Denver.",
        "📦 OUTGOING PLAYER — Moving expenses: The acquiring team (not Denver) is obligated under UPC ¶10(b) to pay the outgoing player's reasonable moving expenses to their new city. Denver has no obligation here once the trade is complete.",
        "🚫 Any benefit beyond what is in the UPC or expressly permitted under the CBA may constitute salary cap circumvention."
      ]
    },
    sections:[
      {name:"Trade Agreement",tasks:[
        {title:"Verbal agreement reached between both GMs",note:"Document terms internally with date/time stamp. Do not disclose publicly before official completion via trade conference call — prohibited by Ops Manual §III.E.5.",tags:["legal","ops"],deadline:"urgent",deadlineText:"Before any emails"},
        {title:"Obtain signed player consent if NTC applies",note:"If any player has a no-trade clause, obtain their signed written consent. The league office will not schedule a trade call until this is received. (§III.E.2.d(5))",tags:["legal","hr"],deadline:"urgent",deadlineText:"Before call can be scheduled"},
        {title:"One team emails trade terms to league office group",note:"Email: KWest@nba.com; mdoria@nba.com; ataub@nba.com; BlRoss@nba.com; HGerstenblatt@nba.com; TWasserman@nba.com; ccrotts@nba.com. Format: '[Team A] and [Team B] have agreed to the following trade, and once the moratorium is lifted, would like to enter the trade queue: [Team A] conveys to [Team B]: [assets]. [Team B] conveys to [Team A]: [assets]. The trade is conditional upon both players reporting to and passing their physicals.'",tags:["league","ops"],deadline:"urgent",deadlineText:"Immediately after agreement"},
        {title:"Other team confirms terms in the same email thread",note:"Partner team replies to the same thread confirming the agreed terms.",tags:["league","ops"],deadline:"urgent",deadlineText:"After initial email sent"}
      ]},
      {name:"Pre-Call Disclosures (Required Before Call is Scheduled)",tasks:[
        {title:"Exchange health disclosures by email — cc league office",note:"Both teams exchange required health disclosures under By-Laws §4.03 by email, with a copy to the league office. Must be in writing and exchanged before the trade call will be scheduled. Cover all current or prior injuries, illnesses, or conditions that could affect the player's ability to play. Use the EMR trade disclosure tool. Avoid excessive verbatim MRI/surgical language — be detailed but focused on materiality. (§III.E.2.d(1), §III.E.2.i)",tags:["medical","legal","league"],deadline:"urgent",deadlineText:"Before call can be scheduled",compliance:"⚠️ The trade call will NOT be scheduled until all health and insurance disclosures are in writing and exchanged with copies to the league office. (§III.E.2.d(5))"},
        {title:"Exchange insurance-related information by email — cc league office",note:"Both teams must also exchange: (1) whether the traded player is enrolled in the leaguewide TTD insurance program and if so whether coverage has any special medical exclusions; (2) any life, disability, or other insurance coverage purchased outside the leaguewide TTD or AD&D programs. Note: acquiring team has 30 days after the trade call to elect to have outside policies assigned to them. (§III.E.2.d(4))",tags:["legal","finance","league"],deadline:"urgent",deadlineText:"Before call can be scheduled"}
      ]},
      {name:"Trade Call Scheduling",tasks:[
        {title:"League replies with proposed trade call time",note:"League office will reply to the thread with a time for the trade call once all disclosures are confirmed received.",tags:["league"],deadline:"urgent",deadlineText:"After disclosures submitted"},
        {title:"Both teams agree to the trade call time",note:"Both teams confirm the proposed time by replying in the thread.",tags:["league","ops"],deadline:"urgent",deadlineText:"Upon receiving proposed time"}
      ]},
      {name:"Trade Call",tasks:[
        {title:"Trade conference call with league office",note:"Participants: rep from each team + NBA Legal Department rep. On the call: (1) parties recite agreed terms; (2) NBA rep reviews contract info and confirms each team has reviewed all exhibits/amendments; (3) each assignor team confirms there are no undisclosed contract terms — undisclosed terms remain the assignor's obligation; (4) teams agree on physical deadline if trade is conditional; (5) teams agree on which team sends the post-call confirming email; (6) teams agree on which team initiates the assignment form. (§III.E.2.e)",tags:["league","legal","ops"],deadline:"urgent",deadlineText:"At scheduled call time"},
        {title:"Note which team is sending the confirming email",note:"Teams agree on the call who sends the post-call confirming email. Write this down.",tags:["ops"],deadline:"urgent",deadlineText:"Confirmed on call"},
        {title:"Note which team is initiating the assignment form",note:"Teams agree on the call who will prepare and initiate the trade assignment form. Write this down.",tags:["legal","ops"],deadline:"urgent",deadlineText:"Confirmed on call"}
      ]},
      {name:"Post-Call Confirmation",tasks:[
        {title:"Assigned team sends confirming email to league office",note:"Immediately after the call, the agreed team sends a confirming email to the league office (cc all other teams) outlining all trade terms. (§III.E.2.f)",tags:["league","ops"],deadline:"urgent",deadlineText:"Immediately after call"},
        {title:"Other team replies confirming the terms",note:"Partner team replies to the confirming email (cc league office and all teams) confirming whether the terms reflected are those agreed on the call. (§III.E.2.f)",tags:["league","ops"],deadline:"urgent",deadlineText:"After confirming email sent"},
        {title:"League sends conditions email with physical deadline and other requirements",note:"League office sends a separate email setting out all conditions that must be satisfied for the trade to be consummated (physicals, trade certifications, etc.). (§III.E.2.g)",tags:["league"],deadline:"urgent",deadlineText:"After both teams confirm"},
        {title:"Receive and retain league memorandum to file",note:"League office prepares a memorandum of all trade terms and conditions. Assignee team also receives a copy of the player contract(s). Retain for your records. (§III.E.2.h)",tags:["league","legal"],deadline:"soon",deadlineText:"Provided by league after call"}
      ]},
      {name:"Physical & Conditions",tasks:[
        {title:"Trade certification form submitted (if player is in last year of contract)",note:"If the acquired player is in the last year of their contract, the acquiring team must complete the trade certification form and reply to the league's conditions email.",tags:["legal","league"],deadline:"urgent",deadlineText:"Reply to league conditions email"},
        {title:"Arrange travel for incoming player to Denver (physical)",note:"Player must report within 48 hours of receiving notice (during season) or one week (between seasons). (§III.E.4)",tags:["ops","finance"],deadline:"urgent",deadlineText:"Immediately upon receiving deadline",compliance:"✅ Transportation to report is permitted as travel required to satisfy contract obligations. (Ops Manual §III.I.2(b))"},
        {title:"Arrange hotel for incoming player (physical)",note:"Short-term lodging for the player while he reports and completes his physical, before the trade is officially consummated.",tags:["ops","finance"],deadline:"urgent",deadlineText:"Before player arrives",compliance:"⚠️ No explicit authorization in the Ops Manual or CBA for hotel during the physical specifically. UPC ¶10(b) covers moving expenses post-trade, not pre-consummation lodging. Confirm with legal/league office before paying."},
        {title:"Coordinate moving expenses for incoming player and family",note:"Once the trade is complete, Denver is contractually obligated as the assignee team to pay all reasonable expenses for the player to move himself and his family to Denver. Coordinate with Player Services and finance. (UPC ¶10(b))",tags:["ops","finance","hr"],deadline:"soon",deadlineText:"After trade complete",compliance:"✅ UPC ¶10(b): Assignee team shall pay all reasonable moving expenses for player and family to the new home city. This is a contractual obligation, not discretionary."},
        {title:"Physical conducted for incoming player",note:"Team physician conducts physical. Document results. Trade is conditional on passing.",tags:["medical"],deadline:"urgent",deadlineText:"Before physical deadline",compliance:"⚠️ CRITICAL: If player fails physical and you want to rescind the trade, you must notify the league office and other team(s) by the deadline agreed on the call. Missing this deadline waives your right to rescind. (§III.E.2.e(6))"},
        {title:"Reply to league conditions email — player has passed physical",note:"Reply in the league's conditions email thread confirming the player has reported and passed their physical.",tags:["league","ops"],deadline:"urgent",deadlineText:"Immediately after physical passed"}
      ]},
      {name:"Trade Completion",tasks:[
        {title:"League sends final email — all conditions met, trade is complete",note:"Do not make any public announcements, and do not allow player to play, practice, or engage in any conditioning until this email is received. (§III.E.2.g)",tags:["league"],deadline:"urgent",deadlineText:"After all conditions satisfied"},
        {title:"Send assignment form to other team for signature immediately",note:"The team assigned on the call must send the assignment form to the other team for signature immediately after all conditions are satisfied. (§III.E.2.l)",tags:["legal","league"],deadline:"urgent",deadlineText:"Immediately after trade complete"},
        {title:"Forward fully signed assignment form to NBA Legal Department",note:"Assignment form with all signatures must be forwarded to NBA Legal within 10 days of the trade call. (§III.E.2.l)",tags:["legal","league"],deadline:"urgent",deadlineText:"Within 10 days of trade call"},
        {title:"Salary apportionment — confirm adjusting payments with finance",note:"Salary is split per diem on trade date. Assignor pays through trade date; assignee pays after. Adjusting payments due within 30 days of the trade call. (§III.E.2.e(4))",tags:["finance","legal"],deadline:"soon",deadlineText:"Within 30 days of trade call"},
        {title:"Message basketball ops — trade is official",note:"Notify Nuggets basketball ops immediately that the trade is complete.",tags:["ops"],deadline:"urgent",deadlineText:"Upon league final confirmation"},
        {title:"Email PR team — trade is official",note:"Notify PR so they can coordinate the public announcement. No public disclosure before this point.",tags:["pr"],deadline:"urgent",deadlineText:"Upon league final confirmation"}
      ]},
      {name:"Outgoing Player Offboarding",tasks:[
        {title:"Notify outgoing player — trade is official",note:"Must notify by phone or email before conclusion of the trade call, or as soon as possible after — no more than one hour after the call and no less than one hour before any public announcement. (§III.E.4)",tags:["hr","ops"],deadline:"urgent",deadlineText:"Before or within 1hr of trade call"},
        {title:"Inform outgoing player of moving expense entitlement",note:"Under UPC ¶10(b), the acquiring team is contractually obligated to pay all reasonable expenses for the player to move himself and his family to the new city. Make sure the player and his agent are aware — this is the acquiring team's obligation, not Denver's.",tags:["hr","legal"],deadline:"urgent",deadlineText:"Upon notifying player of trade"},
        {title:"Chad & Shemar (Player Services) coordinate offboarding",note:"Player Services to connect with outgoing player and assist with transition.",tags:["hr","ops"],deadline:"urgent",deadlineText:"Upon trade official"},
        {title:"Submit IT access removal request",note:"Disable all team accounts: email, video system, team app, building access systems.",tags:["it","ops"],deadline:"urgent",deadlineText:"Upon trade official"},
        {title:"Deactivate physical credentials",note:"Deactivate key cards, parking passes, arena access. Collect any outstanding credentials.",tags:["ops"],deadline:"urgent",deadlineText:"Upon trade official"},
        {title:"Coordinate equipment return with equipment staff",note:"Collect all team-issued gear: jerseys, practice gear, devices. Document everything returned.",tags:["ops"],deadline:"soon",deadlineText:"Within 24hrs"},
        {title:"Locker room cleared and reassigned",note:"Equipment staff clears outgoing player's locker. Reassign as appropriate.",tags:["ops"],deadline:"soon",deadlineText:"Within 24hrs"},
        {title:"Notify HR — initiate payroll offboarding",note:"Final paycheck prorated to trade date. New team takes over salary obligations after trade date.",tags:["hr","finance"],deadline:"soon",deadlineText:"Next payroll cycle"},
        {title:"Send full medical records to acquiring team",note:"Complete medical history transfer as required by CBA.",tags:["medical","legal"],deadline:"soon",deadlineText:"Within 24hrs of trade"}
      ]},
      {name:"Incoming Player Onboarding",tasks:[
        {title:"Chad & Shemar (Player Services) coordinate onboarding",note:"Player Services to connect with incoming player and assist with transition to Denver.",tags:["hr","ops"],deadline:"urgent",deadlineText:"Upon trade official"},
        {title:"Issue credentials and facility access",note:"Practice facility, arena, parking. All access provisioned before first appearance.",tags:["ops"],deadline:"soon",deadlineText:"Before first practice"},
        {title:"Locker room assignment",note:"Assign locker room space. Coordinate with equipment staff.",tags:["ops"],deadline:"soon",deadlineText:"Before first practice"},
        {title:"Equipment and jersey provisioned",note:"Jersey number confirmed. Full kit: home, away, practice. Coordinate sizing and custom orders.",tags:["ops"],deadline:"soon",deadlineText:"Before first practice"},
        {title:"Add to travel manifest",note:"Add to all upcoming trip manifests. Confirm passport/visa status if international travel upcoming.",tags:["ops"],deadline:"soon",deadlineText:"Before next road trip"},
        {title:"Coaching staff orientation",note:"Defensive schemes, offensive sets, team culture, practice expectations.",tags:["ops"],deadline:"soon",deadlineText:"Day 1"},
        {title:"Housing assistance (if needed)",note:"Player Services assists with temporary housing if player is relocating.",tags:["hr","ops"],deadline:"soon",deadlineText:"Upon arrival"},
        {title:"Payroll and direct deposit setup",note:"Finance sets up new payroll entry effective from trade date.",tags:["finance","hr"],deadline:"soon",deadlineText:"Next payroll cycle"},
        {title:"Baseline concussion testing",note:"Any traded player who did not complete baseline concussion testing with their prior team must complete it within 72hrs of first on-court activity. (§III.J.2(b))",tags:["medical"],deadline:"soon",deadlineText:"Within 72hrs of first on-court activity"},
        {title:"Review incoming player's echocardiogram in EMR",note:"Carefully review echocardiogram reports available in the EMR for each player acquired, regardless of what was disclosed on the trade call. (§III.E.2.d(1))",tags:["medical"],deadline:"soon",deadlineText:"Upon trade official"}
      ]}
    ]
  },

};

const db = getFirestore(app);
const STATE_DOC = doc(db, "checklists", "shared-state");

let state = {}, activeTab = 'signing_mid', activeFilter = 'all', dbReady = false;

// Show a subtle sync indicator in the header
function setSyncStatus(status) {
  const el = document.getElementById('sync-status');
  if (!el) return;
  if (status === 'synced')  { el.textContent = '● Live'; el.style.color = '#12b76a'; }
  if (status === 'saving')  { el.textContent = '● Saving…'; el.style.color = '#f0a500'; }
  if (status === 'offline') { el.textContent = '● Offline'; el.style.color = '#f16060'; }
}

// Write a single task toggle to Firestore
async function saveTaskToFirestore(key, value) {
  setSyncStatus('saving');
  try {
    await setDoc(STATE_DOC, { [key]: value }, { merge: true });
    setSyncStatus('synced');
  } catch(e) {
    console.error('Firestore write error:', e);
    setSyncStatus('offline');
  }
}

// Reset an entire tab in Firestore
async function resetTabInFirestore(tab) {
  const cl = CHECKLISTS[tab];
  const updates = {};
  cl.sections.forEach((s, si) => s.tasks.forEach((t, ti) => {
    updates[taskKey(tab, si, ti)] = false;
  }));
  setSyncStatus('saving');
  try {
    await setDoc(STATE_DOC, updates, { merge: true });
    setSyncStatus('synced');
  } catch(e) {
    console.error('Firestore reset error:', e);
    setSyncStatus('offline');
  }
}

// Subscribe to real-time updates from Firestore
function subscribeToFirestore() {
  onSnapshot(STATE_DOC, (snap) => {
    if (snap.exists()) {
      state = snap.data();
    } else {
      state = {};
    }
    dbReady = true;
    setSyncStatus('synced');
    render();
  }, (err) => {
    console.error('Firestore listener error:', err);
    setSyncStatus('offline');
    dbReady = true;
    render();
  });
}

function taskKey(tab, si, ti) { return `${tab}_${si}_${ti}`; }

function getProgress(tab) {
  const cl = CHECKLISTS[tab]; let total = 0, done = 0;
  cl.sections.forEach((s, si) => s.tasks.forEach((t, ti) => {
    total++;
    if (state[taskKey(tab, si, ti)]) done++;
  }));
  return { total, done, pct: total ? Math.round(done / total * 100) : 0 };
}

function switchTab(tab) {
  activeTab = tab; activeFilter = 'all';
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('nav-' + tab).classList.add('active');
  render();
}

function toggleTask(tab, si, ti) {
  const k = taskKey(tab, si, ti);
  const newVal = !state[k];
  state[k] = newVal; // optimistic local update
  render();
  saveTaskToFirestore(k, newVal);
}

function toggleSection(id) {
  const el = document.getElementById(id);
  if (el) el.classList.toggle('collapsed');
}

function resetTab(tab) {
  if (!confirm('Reset all tasks for this checklist? This will clear them for everyone.')) return;
  const cl = CHECKLISTS[tab];
  cl.sections.forEach((s, si) => s.tasks.forEach((t, ti) => {
    state[taskKey(tab, si, ti)] = false;
  }));
  render();
  resetTabInFirestore(tab);
}

function setFilter(f) { activeFilter = f; render(); }

function updateNavProgress() {
  Object.keys(CHECKLISTS).forEach(tab => {
    const el = document.getElementById('prog-' + tab);
    if (el) el.textContent = getProgress(tab).pct + '%';
  });
}

function render() {
  if (!dbReady) {
    document.getElementById('main-content').innerHTML = `
      <div style="display:flex;align-items:center;justify-content:center;height:300px;color:var(--text3);font-size:13px;gap:10px;">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg>
        Connecting to database…
      </div>`;
    return;
  }

  const cl = CHECKLISTS[activeTab];
  const { total, done, pct } = getProgress(activeTab);
  const r = 24, circ = 2 * Math.PI * r, offset = circ - (pct / 100) * circ;
  const depts = ['legal','finance','pr','hr','ops','medical','league','scouting','compliance','it'];

  let html = `
    <div class="page-header">
      <div>
        <div class="page-title">${cl.title}</div>
        <div class="page-desc">${cl.desc}</div>
      </div>
      <div class="progress-wrap">
        <div class="ring-container">
          <svg width="58" height="58" viewBox="0 0 58 58">
            <circle class="ring-bg" cx="29" cy="29" r="${r}"/>
            <circle class="ring-fg" cx="29" cy="29" r="${r}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
          </svg>
          <div class="ring-pct">${pct}%</div>
        </div>
        <div class="ring-label">${done} / ${total}</div>
        <button class="reset-btn" onclick="resetTab('${activeTab}')">Reset</button>
      </div>
    </div>`;

  if (cl.compliance) {
    html += `<div class="compliance-banner"><strong>📋 ${cl.compliance.title}</strong><ul>${cl.compliance.points.map(p => `<li>${p}</li>`).join('')}</ul></div>`;
  }
  if (pct === 100) html += `<div class="all-done">✅ All tasks complete</div>`;

  html += `<div class="filter-row"><span class="filter-lbl">Filter</span>
    <button class="filter-btn ${activeFilter==='all'?'active':''}" onclick="setFilter('all')">All</button>
    <button class="filter-btn ${activeFilter==='pending'?'active':''}" onclick="setFilter('pending')">Pending</button>
    <button class="filter-btn ${activeFilter==='done'?'active':''}" onclick="setFilter('done')">Done</button>
    ${depts.map(d => `<button class="filter-btn ${activeFilter===d?'active':''}" onclick="setFilter('${d}')">${d}</button>`).join('')}
  </div>`;

  cl.sections.forEach((section, si) => {
    const secId = `sec-${activeTab}-${si}`;
    let sTotal = 0, sDone = 0;
    const taskHtml = section.tasks.map((task, ti) => {
      const k = taskKey(activeTab, si, ti), isDone = !!state[k];
      sTotal++; if (isDone) sDone++;
      if (activeFilter === 'pending' && isDone) return '';
      if (activeFilter === 'done' && !isDone) return '';
      if (!['all','pending','done'].includes(activeFilter) && !task.tags.includes(activeFilter)) return '';
      const dlClass = task.deadline === 'urgent' ? 'urgent' : task.deadline === 'soon' ? 'soon' : 'normal';
      return `<div class="task ${isDone ? 'done' : ''}" onclick="toggleTask('${activeTab}',${si},${ti})">
        <div class="task-check">${isDone ? '✓' : ''}</div>
        <div class="task-body">
          <div class="task-title">${task.title}</div>
          ${task.note ? `<div class="task-note">${task.note}</div>` : ''}
          ${task.compliance ? `<div class="task-compliance">${task.compliance}</div>` : ''}
          <div class="task-meta">
            ${task.tags.map(t => `<span class="tag ${t}">${t}</span>`).join('')}
            <span class="deadline ${dlClass}">${task.deadlineText}</span>
          </div>
        </div>
      </div>`;
    }).join('');
    if (!taskHtml.trim()) return;
    html += `<div class="section" id="${secId}">
      <div class="section-header" onclick="toggleSection('${secId}')">
        <span class="section-num">${String(si + 1).padStart(2, '0')}</span>
        <span class="section-name">${section.name}</span>
        <span class="section-pill">${sDone}/${sTotal}</span>
        <span class="section-chevron">▾</span>
      </div>
      <div class="section-body">${taskHtml}</div>
    </div>`;
  });

  document.getElementById('main-content').innerHTML = html;
  updateNavProgress();
}

// Kick off
subscribeToFirestore();

// Expose functions to global scope for inline onclick handlers (required for ES modules)
window.switchTab = switchTab;
window.toggleTask = toggleTask;
window.toggleSection = toggleSection;
window.resetTab = resetTab;
window.setFilter = setFilter;
</script>
</body>
</html>
